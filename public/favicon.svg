<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#080F0F"/>
  <!-- Blue accent rect (offset bottom-right) -->
  <rect x="220" y="120" width="240" height="300" rx="8" fill="url(#grad)"/>
  <!-- Black main rect -->
  <rect x="60" y="60" width="272" height="272" rx="8" fill="#111111"/>
  <!-- Gavel silhouette -->
  <g transform="translate(256 220) rotate(-45)">
    <!-- Head -->
    <rect x="-72" y="-32" width="144" height="64" rx="6" fill="white"/>
    <!-- Handle -->
    <rect x="20" y="32" width="28" height="160" rx="6" fill="white"/>
  </g>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B6EFF"/>
      <stop offset="100%" stop-color="#89A6FB"/>
    </linearGradient>
  </defs>
</svg>
